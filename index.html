<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@font-face{
    font-family:"Vintage Moon";
    src:url("VintageMoon.ttf") format("truetype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#F8E5F1 url("fundo.jpg") center center/cover no-repeat;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

.container{
    text-align:center;
    backdrop-filter:blur(2px);
}

/* Flor */
.flor{
    width:250px;
    margin-bottom:15px;
    opacity:.95;
}

/* Logo */
.logo{
    font-family:"Vintage Moon";
    font-size:185px;
    color:#111;
    line-height:.9;
    text-shadow:0 5px 12px rgba(0,0,0,.08);
}

/* Subtítulo */
.subtitulo{
    margin-top:22px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;

    font-size:30px;
    color:#333;

    font-family:Georgia, serif;
    letter-spacing:.5px;
}

.subtitulo::before,
.subtitulo::after{
    content:"";
    width:90px;
    height:2px;
    background:#555;
    border-radius:20px;
}

/* Responsivo */

@media(max-width:900px){

.logo{
    font-size:120px;
}

.flor{
    width:170px;
}

.subtitulo{
    font-size:22px;
}

.subtitulo::before,
.subtitulo::after{
    width:55px;
}

}

</style>

</head>

<body>

<div class="container">

    <img src="flor.png" class="flor" alt="Peônia">

    <div class="logo">
        Peony
    </div>

    <div class="subtitulo">
        Floresça do seu jeito
    </div>

</div>

</body>
</html>
