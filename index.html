<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
@font-face {
    font-family: "Vintage Moon";
    src: url("Vintage%20Moon%20Regular.ttf") format("truetype");
}

html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: fit-content;
    height: fit-content;
}

body {
    display: inline-block;
}

.logo {
    font-family: "Vintage Moon", cursive;
    font-size: 160px;
    color: #000000;
    line-height: 1;
    white-space: nowrap;
    display: inline-block;
}
</style>
</head>

<body>
    <span class="logo">Peony</span>
</body>
</html>
