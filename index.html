<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@font-face {
    font-family: "Vintage Moon";
    src: url("Vintage%20Moon%20Regular.ttf") format("truetype");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:url("fundo.jpg") center center/cover no-repeat;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, sans-serif;
}

.container{
    text-align:center;
}

.logo{
    font-family:"Vintage Moon", cursive;
    font-size:150px;
    color:#000;
    line-height:1;
}

.subtitulo{
    margin-top:15px;
    font-size:32px;
    color:#333;
    letter-spacing:1px;
}
</style>

</head>

<body>

<div class="container">
    <div class="logo">Peony</div>
    <div class="subtitulo">Floresça do seu jeito</div>
</div>

</body>
</html>
